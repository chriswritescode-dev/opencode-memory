services:
  sandbox:
    build: .
    ports:
      - "${SANDBOX_PORT:-2222}:22"
    volumes:
      - sandbox-data:/projects
      - ${SANDBOX_AUTH_KEYS:-./authorized_keys}:/home/devuser/.ssh/authorized_keys:ro
    environment:
      - AUTHORIZED_KEYS=${AUTHORIZED_KEYS:-}
    restart: unless-stopped

volumes:
  sandbox-data:
